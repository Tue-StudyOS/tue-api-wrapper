name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    name: Release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux packaging dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install Python sidecar dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e package pyinstaller

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Prepare macOS signing inputs
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_SIGNING_CERTIFICATE_P12_BASE64:-}" || -z "${APPLE_SIGNING_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "::warning::Missing APPLE_SIGNING_CERTIFICATE_P12_BASE64 or APPLE_SIGNING_CERTIFICATE_PASSWORD. Building macOS artifacts with ad-hoc signing."
            {
              echo "CSC_IDENTITY_AUTO_DISCOVERY=false"
              echo "MAC_SIGNING_MODE=ad-hoc"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          CERT_PATH="$CERT_PATH" APPLE_SIGNING_CERTIFICATE_P12_BASE64="$APPLE_SIGNING_CERTIFICATE_P12_BASE64" python -c "import base64, os, pathlib; pathlib.Path(os.environ['CERT_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_SIGNING_CERTIFICATE_P12_BASE64']))"

          {
            echo "CSC_LINK=$CERT_PATH"
            echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERTIFICATE_PASSWORD"
          } >> "$GITHUB_ENV"

          if [[ -n "${APPLE_API_KEY_BASE64:-}" || -n "${APPLE_API_KEY_ID:-}" || -n "${APPLE_API_ISSUER:-}" ]]; then
            if [[ -z "${APPLE_API_KEY_BASE64:-}" || -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
              echo "::error::Incomplete App Store Connect API key notarization secrets. Set APPLE_API_KEY_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER."
              exit 1
            fi

            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            API_KEY_PATH="$API_KEY_PATH" APPLE_API_KEY_BASE64="$APPLE_API_KEY_BASE64" python -c "import base64, os, pathlib; pathlib.Path(os.environ['API_KEY_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_API_KEY_BASE64']))"

            {
              echo "APPLE_API_KEY=$API_KEY_PATH"
              echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
              echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
              echo "MAC_SIGNING_MODE=signed-and-notarized"
            } >> "$GITHUB_ENV"
          elif [[ -n "${APPLE_ID:-}" || -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -n "${APPLE_TEAM_ID:-}" ]]; then
            if [[ -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "::error::Incomplete Apple ID notarization secrets. Set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID."
              exit 1
            fi

            {
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
              echo "MAC_SIGNING_MODE=signed-and-notarized"
            } >> "$GITHUB_ENV"
          else
            echo "::error::Missing notarization secrets. Set either App Store Connect API key secrets or Apple ID notarization secrets."
            exit 1
          fi

      - name: Prepare Windows signing inputs
        if: runner.os == 'Windows'
        shell: bash
        env:
          WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64:-}" && -n "${WINDOWS_SIGNING_CERTIFICATE_PASSWORD:-}" ]]; then
            CERT_PATH="$RUNNER_TEMP/windows-signing-cert.pfx"
            CERT_PATH="$CERT_PATH" WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64="$WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64" python -c "import base64, os, pathlib; pathlib.Path(os.environ['CERT_PATH']).write_bytes(base64.b64decode(os.environ['WINDOWS_SIGNING_CERTIFICATE_PFX_BASE64']))"

            {
              echo "WIN_CSC_LINK=$CERT_PATH"
              echo "WIN_CSC_KEY_PASSWORD=$WINDOWS_SIGNING_CERTIFICATE_PASSWORD"
              echo "WINDOWS_SIGNING_MODE=signed"
            } >> "$GITHUB_ENV"
          else
            echo "::warning::Windows signing certificate secrets are missing. The Windows installer will be unsigned."
            echo "WINDOWS_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
          fi

      - name: Build desktop distributables
        run: |
          npm run build:backend --prefix desktop
          npm run package --prefix desktop -- --publish=never
        env:
          PYTHON: python

      - name: Summarize signing mode
        shell: bash
        run: |
          {
            echo "### Desktop release signing"
            echo ""
            case "${RUNNER_OS}" in
              macOS)
                echo "- macOS: ${MAC_SIGNING_MODE:-unsigned}"
                ;;
              Windows)
                echo "- Windows: ${WINDOWS_SIGNING_MODE:-unsigned}"
                ;;
              Linux)
                echo "- Linux: unsigned (not applicable)"
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: desktop/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true

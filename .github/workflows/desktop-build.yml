name: Desktop Build

on:
  push:
    branches: ["main"]
    paths:
      - "desktop/**"
      - "package/**"
      - ".github/workflows/desktop-build.yml"
      - ".github/workflows/desktop-release.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "package/**"
      - ".github/workflows/desktop-build.yml"
      - ".github/workflows/desktop-release.yml"

jobs:
  desktop:
    name: Desktop build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linux packaging dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install Python sidecar dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e package pyinstaller

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build desktop distributables
        run: |
          npm run build:backend --prefix desktop
          npm run package --prefix desktop -- --publish=never
        env:
          PYTHON: python
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/release/*
          if-no-files-found: error
